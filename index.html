const{useState,useEffect,useMemo}=React;
const T={navy:'#1b2d3a',navyMid:'#243747',gold:'#c9a84c',goldLight:'#e2c97e',teal:'#2e8b8b',tealLight:'#75afb1',tealPale:'#e8f5f5',cream:'#faf7f2',white:'#ffffff',border:'#ede8df',textSec:'#5a7a8a',textSub:'#9ab0bb',green:'#2a7a50',greenLight:'#e6f4ed',amber:'#b5730a',amberLight:'#fff3d6',red:'#c0392b',redPale:'#fdecea'};
const btn={fontFamily:"'Georgia',serif",cursor:'pointer',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:700,borderRadius:6,border:'none',fontSize:11};

function createSB(url,key){
  const hdrs=()=>({'Content-Type':'application/json','apikey':key,'Authorization':'Bearer '+key});
  const dbReq=async(method,table,filters,body)=>{
    const q=filters&&filters.length?'?'+filters.join('&'):'';
    const r=await fetch(url+'/rest/v1/'+table+q,{method,headers:{...hdrs(),Prefer:'return=representation'},body:body?JSON.stringify(body):undefined});
    const t=await r.text();const d=t?JSON.parse(t):null;
    return r.ok?{data:d,error:null}:{data:null,error:d};
  };
  const auth={
    signInWithPassword:async({email,password})=>{
      const r=await fetch(url+'/auth/v1/token?grant_type=password',{method:'POST',headers:hdrs(),body:JSON.stringify({email,password})});
      const d=await r.json();
      if(!r.ok)return{data:null,error:{message:d.error_description||'Incorrect credentials'}};
      localStorage.setItem('pmtp_ag_s',JSON.stringify(d));
      return{data:{session:d},error:null};
    },
    signOut:()=>{localStorage.removeItem('pmtp_ag_s');return Promise.resolve({error:null});},
    getSession:()=>{
      try{const s=JSON.parse(localStorage.getItem('pmtp_ag_s')||'null');
        if(s&&s.expires_at&&Date.now()/1000<s.expires_at)return{data:{session:s},error:null};
      }catch(e){}
      return{data:{session:null},error:null};
    },
  };
  const from=table=>({
    select:(cols='*')=>{
      let f=[],ord='';
      const q={
        order:(c,o={})=>{ord='order='+c+'.'+((o.ascending===false)?'desc':'asc');return q;},
        then:(res,rej)=>{return dbReq('GET',table,['select='+cols,ord].filter(Boolean),null).then(res,rej);}
      };return q;
    },
    delete:()=>({eq:async(c,v)=>{const q='?'+c+'=eq.'+encodeURIComponent(v);const r=await fetch(url+'/rest/v1/'+table+q,{method:'DELETE',headers:hdrs()});return r.ok?{data:null,error:null}:{data:null,error:'Delete failed'};}})  ,
  });
  return{auth,from};
}
const sb=createSB(window.AGENCY_SB.URL,window.AGENCY_SB.KEY);

function LoginScreen({onAuth}){
  const[email,setEmail]=useState('');
  const[pw,setPw]=useState('');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  async function submit(){
    setErr('');setLoading(true);
    const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){setErr(error.message);setLoading(false);}
    else onAuth(data.session);
  }
  const iS={width:'100%',padding:'11px 14px',border:'1.5px solid '+T.border,borderRadius:8,fontSize:14,color:T.navy,background:T.cream,outline:'none'};
  return(
    <div style={{minHeight:'100vh',background:T.cream,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:T.white,borderRadius:16,border:'1px solid '+T.border,boxShadow:'0 12px 56px rgba(27,45,58,0.14)',padding:'52px 48px',width:420,textAlign:'center'}}>
        <div style={{width:56,height:3,background:'linear-gradient(90deg,'+T.gold+','+T.teal+')',borderRadius:2,margin:'0 auto 20px'}}/>
        <div style={{fontSize:9.5,letterSpacing:'0.24em',color:T.textSec,textTransform:'uppercase',marginBottom:8}}>Point Me to Paradise Travel</div>
        <div style={{fontSize:24,fontWeight:700,color:T.navy,letterSpacing:'0.04em',marginBottom:4}}>Agency Commissions</div>
        <div style={{fontSize:12,color:T.textSub,marginBottom:24}}>Owner Access Only</div>
        {err&&<div style={{background:T.redPale,border:'1px solid #f5c2c0',borderRadius:6,padding:'10px 14px',fontSize:12,color:T.red,marginBottom:16,textAlign:'left'}}>{err}</div>}
        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:20}}>
          <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Email" type="email" style={iS}/>
          <input value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Password" type="password" style={iS}/>
        </div>
        <button onClick={submit} disabled={loading} style={{...btn,width:'100%',padding:'13px 0',fontSize:12,background:'linear-gradient(135deg,'+T.navy+','+T.navyMid+')',border:'1px solid '+T.gold,color:T.goldLight,opacity:loading?0.7:1}}>
          {loading?'Signing In…':'Sign In →'}
        </button>
      </div>
    </div>
  );
}

function App(){
  const[session,setSession]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[tab,setTab]=useState('payments');
  const[payments,setPayments]=useState([]);
  const[pending,setPending]=useState([]);
  const[dataLoading,setDataLoading]=useState(false);
  const[toast,setToast]=useState(null);

  // Payment filters
  const[search,setSearch]=useState('');
  const[fAgent,setFAgent]=useState('');
  const[fClient,setFClient]=useState('');
  const[fRef,setFRef]=useState('');
  const[fSupplier,setFSupplier]=useState('');
  const[fYear,setFYear]=useState('');
  const[fAmin,setFAmin]=useState('');
  const[fAmax,setFAmax]=useState('');

  // Pending filters
  const[ps,setPs]=useState('');
  const[pfAgent,setPfAgent]=useState('');
  const[pfClient,setPfClient]=useState('');
  const[pfSupplier,setPfSupplier]=useState('');
  const[pfYear,setPfYear]=useState('');
  const[pfStatus,setPfStatus]=useState('');
  const[pfReferral,setPfReferral]=useState('');

  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),4000);};

  useEffect(()=>{
    const{data:{session:s}}=sb.auth.getSession();
    setSession(s);setLoaded(true);
  },[]);

  useEffect(()=>{if(session)load();},[session]);

  async function load(){
    setDataLoading(true);
    const[{data:p},{data:pend}]=await Promise.all([
      sb.from('agency_payments').select('*').order('created_at',{ascending:false}),
      sb.from('agency_pending').select('*').order('created_at',{ascending:false}),
    ]);
    setPayments(p||[]);setPending(pend||[]);setDataLoading(false);
  }

  const cur=n=>n==null||isNaN(n)?'—':'$'+parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const YEARS=[];for(let y=2024;y<=2036;y++)YEARS.push(y);
  const agents=[...new Set([...payments.map(p=>p.agent_name),...pending.map(p=>p.agent_name)].filter(Boolean))].sort();
  const suppliers=[...new Set([...payments.map(p=>p.supplier),...pending.map(p=>p.supplier)].filter(Boolean))].sort();

  const filtPay=useMemo(()=>{
    let f=[...payments];
    if(search){const q=search.toLowerCase();f=f.filter(p=>Object.values(p).some(v=>v&&String(v).toLowerCase().includes(q)));}
    if(fAgent)f=f.filter(p=>p.agent_name===fAgent);
    if(fClient)f=f.filter(p=>p.client&&p.client.toLowerCase().includes(fClient.toLowerCase()));
    if(fRef)f=f.filter(p=>p.ref&&p.ref.toLowerCase().includes(fRef.toLowerCase()));
    if(fSupplier)f=f.filter(p=>p.supplier===fSupplier);
    if(fYear)f=f.filter(p=>String(p.year)===fYear);
    if(fAmin)f=f.filter(p=>parseFloat(p.amount||0)>=parseFloat(fAmin));
    if(fAmax)f=f.filter(p=>parseFloat(p.amount||0)<=parseFloat(fAmax));
    return f;
  },[payments,search,fAgent,fClient,fRef,fSupplier,fYear,fAmin,fAmax]);

  const filtPend=useMemo(()=>{
    let f=[...pending];
    if(ps){const q=ps.toLowerCase();f=f.filter(p=>Object.values(p).some(v=>v&&String(v).toLowerCase().includes(q)));}
    if(pfAgent)f=f.filter(p=>p.agent_name===pfAgent);
    if(pfClient)f=f.filter(p=>p.client&&p.client.toLowerCase().includes(pfClient.toLowerCase()));
    if(pfSupplier)f=f.filter(p=>p.supplier===pfSupplier);
    if(pfYear)f=f.filter(p=>String(p.year)===pfYear);
    if(pfStatus)f=f.filter(p=>p.status===pfStatus);
    if(pfReferral)f=f.filter(p=>(p.referral_type||'standard')===pfReferral);
    return f;
  },[pending,ps,pfAgent,pfClient,pfSupplier,pfYear,pfStatus,pfReferral]);

  const payTotal=filtPay.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const pendTotal=filtPend.reduce((s,p)=>s+(parseFloat(p.expected_amount)||0),0);
  const allRec=payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const allPend=pending.filter(p=>p.status==='pending').reduce((s,p)=>s+(parseFloat(p.expected_amount)||0),0);

  const agentTotals=useMemo(()=>{
    const t={};
    payments.forEach(p=>{if(!t[p.agent_name])t[p.agent_name]={rec:0,pend:0};t[p.agent_name].rec+=(parseFloat(p.amount)||0);});
    pending.filter(p=>p.status==='pending').forEach(p=>{if(!t[p.agent_name])t[p.agent_name]={rec:0,pend:0};t[p.agent_name].pend+=(parseFloat(p.expected_amount)||0);});
    return t;
  },[payments,pending]);

  function exportCSV(data,name){
    if(!data.length)return;
    const keys=Object.keys(data[0]);
    const rows=[keys.join(','),...data.map(r=>keys.map(k=>{const v=r[k]===null||r[k]===undefined?'':String(r[k]);return v.includes(',')?'"'+v+'"':v;}).join(','))];
    const blob=new Blob([rows.join('\n')],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
    showToast('CSV exported!');
  }

  async function delPay(id){
    await sb.from('agency_payments').delete().eq('id',id);
    setPayments(p=>p.filter(x=>x.id!==id));showToast('Removed.');
  }
  async function delPend(id){
    await sb.from('agency_pending').delete().eq('id',id);
    setPending(p=>p.filter(x=>x.id!==id));showToast('Removed.');
  }

  const inp={padding:'7px 11px',border:'1px solid '+T.border,borderRadius:6,fontSize:12,color:T.navy,background:T.white,outline:'none'};
  const tabS=(t)=>({background:'none',border:'none',borderBottom:'2.5px solid '+(tab===t?T.teal:'transparent'),color:tab===t?T.teal:T.textSec,fontFamily:'Georgia,serif',fontSize:12,textTransform:'uppercase',letterSpacing:'0.07em',padding:'10px 20px',cursor:'pointer',marginBottom:-1});

  if(!loaded)return<div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:T.cream}}><div style={{color:T.textSec,fontSize:13}}>Loading…</div></div>;
  if(!session)return<LoginScreen onAuth={s=>setSession(s)}/>;

  return(
    <div style={{minHeight:'100vh',background:T.cream}}>
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,'+T.navy+','+T.navyMid+')',borderBottom:'2px solid '+T.gold,padding:'0 28px',height:68,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:20}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:'linear-gradient(90deg,transparent,'+T.gold+','+T.goldLight+','+T.gold+',transparent)'}}/>
        <div>
          <div style={{fontSize:9,letterSpacing:'0.22em',color:T.goldLight,textTransform:'uppercase',opacity:0.7,marginBottom:3}}>Point Me to Paradise Travel</div>
          <div style={{fontSize:14,fontWeight:700,color:T.white,letterSpacing:'0.14em',textTransform:'uppercase'}}>Agency Commission Dashboard</div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <div style={{background:'rgba(201,168,76,0.15)',border:'1px solid rgba(201,168,76,0.3)',borderRadius:20,padding:'4px 14px',fontSize:10,color:T.goldLight,letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:700}}>{agents.length} Agents</div>
          <button onClick={async()=>{await sb.auth.signOut();setSession(null);}} style={{...btn,padding:'5px 12px',fontSize:10,background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.15)',color:T.textSub}}>Sign Out</button>
        </div>
      </div>

      <div style={{padding:'20px 28px',maxWidth:1400,margin:'0 auto'}}>
        {/* Summary Cards */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10,marginBottom:16}}>
          {[
            {label:'All-Time Received',value:cur(allRec),color:T.teal,sub:payments.length+' records'},
            {label:'All-Time Pending',value:cur(allPend),color:T.amber,sub:pending.filter(p=>p.status==='pending').length+' expected'},
            {label:'Total Expected',value:cur(allRec+allPend),color:T.navy,sub:'received + pending'},
            {label:'Active Agents',value:agents.length,color:'#7b59b6',sub:'in system'},
          ].map((c,i)=>(
            <div key={i} style={{background:T.white,border:'1px solid '+T.border,borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:10,color:T.textSec,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>{c.label}</div>
              <div style={{fontSize:22,fontWeight:700,color:c.color,lineHeight:1}}>{c.value}</div>
              {c.sub&&<div style={{fontSize:10,color:T.textSub,marginTop:4}}>{c.sub}</div>}
            </div>
          ))}
        </div>

        {/* Per-Agent Summary */}
        {agents.length>0&&<div style={{background:T.white,border:'1px solid '+T.border,borderRadius:10,overflow:'hidden',marginBottom:16}}>
          <div style={{padding:'10px 16px',borderBottom:'1px solid '+T.border,fontSize:10,letterSpacing:'0.12em',color:T.textSec,textTransform:'uppercase',fontWeight:700}}>Per-Agent Summary</div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr>{['Agent','Received','Pending','Total Expected'].map(h=>(
                <th key={h} style={{background:'#f5f3ef',padding:'8px 14px',fontSize:10,color:T.textSec,textTransform:'uppercase',letterSpacing:'0.07em',borderBottom:'1px solid '+T.border,textAlign:h==='Agent'?'left':'right'}}>{h}</th>
              ))}</tr></thead>
              <tbody>
                {agents.map((agent,i)=>{
                  const t=agentTotals[agent]||{rec:0,pend:0};
                  return(<tr key={i} style={{borderBottom:'1px solid '+T.border}}>
                    <td style={{padding:'10px 14px',fontWeight:700,fontSize:13}}>{agent}</td>
                    <td style={{padding:'10px 14px',color:T.green,fontWeight:700,textAlign:'right'}}>{cur(t.rec)}</td>
                    <td style={{padding:'10px 14px',color:T.amber,fontWeight:700,textAlign:'right'}}>{cur(t.pend)}</td>
                    <td style={{padding:'10px 14px',fontWeight:700,textAlign:'right'}}>{cur(t.rec+t.pend)}</td>
                  </tr>);
                })}
              </tbody>
              <tfoot><tr style={{background:'#f5f3ef'}}>
                <td style={{padding:'10px 14px',fontWeight:700,fontSize:12,textTransform:'uppercase',letterSpacing:'0.06em',borderTop:'2px solid '+T.border}}>Agency Total</td>
                <td style={{padding:'10px 14px',color:T.green,fontWeight:700,textAlign:'right',borderTop:'2px solid '+T.border}}>{cur(allRec)}</td>
                <td style={{padding:'10px 14px',color:T.amber,fontWeight:700,textAlign:'right',borderTop:'2px solid '+T.border}}>{cur(allPend)}</td>
                <td style={{padding:'10px 14px',fontWeight:700,textAlign:'right',borderTop:'2px solid '+T.border}}>{cur(allRec+allPend)}</td>
              </tr></tfoot>
            </table>
          </div>
        </div>}

        {/* Tabs */}
        <div style={{background:T.white,border:'1px solid '+T.border,borderRadius:10,overflow:'hidden'}}>
          <div style={{display:'flex',borderBottom:'1px solid '+T.border,padding:'0 4px'}}>
            <button onClick={()=>setTab('payments')} style={tabS('payments')}>💰 Payments ({payments.length})</button>
            <button onClick={()=>setTab('pending')} style={tabS('pending')}>⏳ Pending ({pending.filter(p=>p.status==='pending').length})</button>
          </div>

          {/* PAYMENTS */}
          {tab==='payments'&&<div style={{padding:16}}>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12,alignItems:'center'}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search all fields..." style={{...inp,flex:'1 1 180px'}}/>
              <select value={fAgent} onChange={e=>setFAgent(e.target.value)} style={inp}><option value="">All Agents</option>{agents.map(a=><option key={a}>{a}</option>)}</select>
              <input value={fClient} onChange={e=>setFClient(e.target.value)} placeholder="Client name..." style={{...inp,width:130}}/>
              <input value={fRef} onChange={e=>setFRef(e.target.value)} placeholder="Booking ref..." style={{...inp,width:120}}/>
              <select value={fSupplier} onChange={e=>setFSupplier(e.target.value)} style={inp}><option value="">All Suppliers</option>{suppliers.map(s=><option key={s}>{s}</option>)}</select>
              <select value={fYear} onChange={e=>setFYear(e.target.value)} style={inp}><option value="">All Years</option>{YEARS.map(y=><option key={y}>{y}</option>)}</select>
              <input value={fAmin} onChange={e=>setFAmin(e.target.value)} placeholder="$ Min" type="number" style={{...inp,width:75}}/>
              <input value={fAmax} onChange={e=>setFAmax(e.target.value)} placeholder="$ Max" type="number" style={{...inp,width:75}}/>
              {(search||fAgent||fClient||fRef||fSupplier||fYear||fAmin||fAmax)&&<button onClick={()=>{setSearch('');setFAgent('');setFClient('');setFRef('');setFSupplier('');setFYear('');setFAmin('');setFAmax('');}} style={{...btn,padding:'6px 12px',fontSize:10,background:'transparent',border:'1px solid '+T.border,color:T.textSec}}>Clear</button>}
              <span style={{fontSize:11,color:T.textSec,whiteSpace:'nowrap'}}>{filtPay.length} records · {cur(payTotal)}</span>
              <button onClick={()=>exportCSV(filtPay,'agency_payments.csv')} style={{...btn,padding:'6px 14px',fontSize:10,background:T.navy,color:T.goldLight,border:'1px solid '+T.gold}}>⬇ CSV</button>
            </div>
            {dataLoading?<div style={{padding:'40px',textAlign:'center',color:T.textSub}}>Loading...</div>:
            filtPay.length===0?<div style={{padding:'40px',textAlign:'center',color:T.textSub,fontSize:13}}>No records match your filters.</div>:
            <div style={{overflowX:'auto',border:'1px solid '+T.border,borderRadius:8}}>
              <table style={{width:'100%',borderCollapse:'collapse',minWidth:700}}>
                <thead><tr>{['Agent','Client','Booking Ref','Supplier','Paid Date','Year','Commission',''].map(h=>(
                  <th key={h} style={{background:'#f5f3ef',padding:'8px 12px',fontSize:10,color:T.textSec,textTransform:'uppercase',letterSpacing:'0.07em',borderBottom:'1px solid '+T.border,textAlign:h==='Commission'?'right':'left',whiteSpace:'nowrap'}}>{h}</th>
                ))}</tr></thead>
                <tbody>
                  {filtPay.map((p,i)=>(
                    <tr key={p.id||i} style={{borderBottom:'1px solid #f5f3ef'}}>
                      <td style={{padding:'9px 12px'}}><span style={{background:T.tealPale,color:T.teal,padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{p.agent_name||'—'}</span></td>
                      <td style={{padding:'9px 12px',fontWeight:600,fontSize:13}}>{p.client||'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,fontSize:11,fontFamily:'Courier New,monospace'}}>{p.ref||'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,fontSize:12}}>{p.supplier||'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,fontSize:11,whiteSpace:'nowrap'}}>{p.paid_date||'—'}</td>
                      <td style={{padding:'9px 12px'}}><span style={{background:'#f5f3ef',color:T.textSec,fontSize:9,padding:'1px 6px',borderRadius:10,border:'1px solid '+T.border}}>{p.year||'—'}</span></td>
                      <td style={{padding:'9px 12px',color:'#2a7a50',fontWeight:700,textAlign:'right',fontSize:13,whiteSpace:'nowrap'}}>{cur(p.amount)}</td>
                      <td style={{padding:'9px 12px'}}><button onClick={()=>{if(window.confirm('Are you sure you want to remove this record? This cannot be undone.'))delPay(p.id);}} style={{background:T.redPale,border:'1px solid rgba(192,57,43,0.25)',borderRadius:5,color:T.red,fontSize:11,padding:'3px 8px',cursor:'pointer'}}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
                <tfoot><tr style={{background:'#f5f3ef'}}>
                  <td colSpan={6} style={{padding:'9px 12px',fontWeight:700,fontSize:12,borderTop:'2px solid '+T.border}}>Filtered Total</td>
                  <td style={{padding:'9px 12px',fontWeight:700,color:'#2a7a50',textAlign:'right',borderTop:'2px solid '+T.border,fontSize:14,whiteSpace:'nowrap'}}>{cur(payTotal)}</td>
                  <td style={{borderTop:'2px solid '+T.border}}/>
                </tr></tfoot>
              </table>
            </div>}
          </div>}

          {/* PENDING */}
          {tab==='pending'&&<div style={{padding:16}}>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12,alignItems:'center'}}>
              <input value={ps} onChange={e=>setPs(e.target.value)} placeholder="🔍 Search all fields..." style={{...inp,flex:'1 1 180px'}}/>
              <select value={pfAgent} onChange={e=>setPfAgent(e.target.value)} style={inp}><option value="">All Agents</option>{agents.map(a=><option key={a}>{a}</option>)}</select>
              <input value={pfClient} onChange={e=>setPfClient(e.target.value)} placeholder="Client name..." style={{...inp,width:130}}/>
              <select value={pfSupplier} onChange={e=>setPfSupplier(e.target.value)} style={inp}><option value="">All Suppliers</option>{suppliers.map(s=><option key={s}>{s}</option>)}</select>
              <select value={pfYear} onChange={e=>setPfYear(e.target.value)} style={inp}><option value="">All Years</option>{YEARS.map(y=><option key={y}>{y}</option>)}</select>
              <select value={pfStatus} onChange={e=>setPfStatus(e.target.value)} style={inp}><option value="">All Status</option><option value="pending">Pending</option><option value="received">Received</option></select>
              <select value={pfReferral} onChange={e=>setPfReferral(e.target.value)} style={inp}>
                <option value="">All Types</option>
                <option value="standard">Standard</option>
                <option value="agent_to_agent">🤝 Agent-to-Agent</option>
                <option value="agency_referral">🌐 Agency Referral</option>
              </select>
              {(ps||pfAgent||pfClient||pfSupplier||pfYear||pfStatus||pfReferral)&&<button onClick={()=>{setPs('');setPfAgent('');setPfClient('');setPfSupplier('');setPfYear('');setPfStatus('');setPfReferral('');}} style={{...btn,padding:'6px 12px',fontSize:10,background:'transparent',border:'1px solid '+T.border,color:T.textSec}}>Clear</button>}
              <span style={{fontSize:11,color:T.textSec,whiteSpace:'nowrap'}}>{filtPend.length} records · {cur(pendTotal)}</span>
              <button onClick={()=>exportCSV(filtPend,'agency_pending.csv')} style={{...btn,padding:'6px 14px',fontSize:10,background:T.navy,color:T.goldLight,border:'1px solid '+T.gold}}>⬇ CSV</button>
            </div>
            {dataLoading?<div style={{padding:'40px',textAlign:'center',color:T.textSub}}>Loading...</div>:
            filtPend.length===0?<div style={{padding:'40px',textAlign:'center',color:T.textSub,fontSize:13}}>No records match your filters.</div>:
            <div style={{overflowX:'auto',border:'1px solid '+T.border,borderRadius:8}}>
              <table style={{width:'100%',borderCollapse:'collapse',minWidth:800}}>
                <thead><tr>{['Agent','Client','Supplier','Booking Ref','Expected Date','Gross','Sup %','Split %','Commission','Type','Status',''].map(h=>(
                  <th key={h} style={{background:'#f5f3ef',padding:'8px 12px',fontSize:10,color:T.textSec,textTransform:'uppercase',letterSpacing:'0.07em',borderBottom:'1px solid '+T.border,textAlign:['Gross','Sup %','Split %','Commission'].includes(h)?'right':'left',whiteSpace:'nowrap'}}>{h}</th>
                ))}</tr></thead>
                <tbody>
                  {filtPend.map((p,i)=>(
                    <tr key={p.id||i} style={{borderBottom:'1px solid #f5f3ef'}}>
                      <td style={{padding:'9px 12px'}}><span style={{background:T.tealPale,color:T.teal,padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{p.agent_name||'—'}</span></td>
                      <td style={{padding:'9px 12px',fontWeight:600,fontSize:13}}>{p.client||'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,fontSize:12}}>{p.supplier||'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,fontSize:11,fontFamily:'Courier New,monospace'}}>{p.ref||'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,fontSize:11,whiteSpace:'nowrap'}}>{p.expected_date||'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,textAlign:'right',fontSize:12,whiteSpace:'nowrap'}}>{p.gross?cur(p.gross):'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,textAlign:'right',fontSize:12}}>{p.supplier_pct?p.supplier_pct+'%':'—'}</td>
                      <td style={{padding:'9px 12px',color:T.textSec,textAlign:'right',fontSize:12}}>{p.agent_split_pct?p.agent_split_pct+'%':'—'}</td>
                      <td style={{padding:'9px 12px',color:T.amber,fontWeight:700,textAlign:'right',fontSize:13,whiteSpace:'nowrap'}}>{cur(p.expected_amount)}</td>
                      <td style={{padding:'9px 12px'}}>
                        {p.referral_type==='agency_referral'?<span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,background:'#e8f5f5',color:T.teal,border:'1px solid rgba(46,139,139,0.3)',whiteSpace:'nowrap'}}>🌐 Agency Ref</span>
                        :p.referral_type==='agent_to_agent'?<span style={{display:'inline-flex',flexDirection:'column',gap:1}}><span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,background:'#f0ecf8',color:'#7b5ea7',border:'1px solid rgba(123,94,167,0.3)',whiteSpace:'nowrap'}}>🤝 Agent Split</span>{p.split_with&&<span style={{fontSize:9,color:'#7b5ea7',paddingLeft:4}}>{p.split_with}</span>}</span>
                        :<span style={{display:'inline-flex',padding:'2px 8px',borderRadius:20,fontSize:10,color:T.textSub,border:'1px solid '+T.border}}>Standard</span>}
                      </td>
                      <td style={{padding:'9px 12px'}}><span style={{display:'inline-block',padding:'2px 8px',borderRadius:20,fontSize:10,fontWeight:700,whiteSpace:'nowrap',background:p.status==='received'?T.greenLight:T.amberLight,color:p.status==='received'?T.green:T.amber,border:'1px solid '+(p.status==='received'?'rgba(42,122,80,.25)':'rgba(181,115,10,.25)')}}>{p.status==='received'?'Received':'Pending'}</span></td>
                      <td style={{padding:'9px 12px'}}><button onClick={()=>{if(window.confirm('Are you sure you want to remove this record? This cannot be undone.'))delPend(p.id);}} style={{background:T.redPale,border:'1px solid rgba(192,57,43,0.25)',borderRadius:5,color:T.red,fontSize:11,padding:'3px 8px',cursor:'pointer'}}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
                <tfoot><tr style={{background:'#f5f3ef'}}>
                  <td colSpan={8} style={{padding:'9px 12px',fontWeight:700,fontSize:12,borderTop:'2px solid '+T.border}}>Filtered Total</td>
                  <td style={{padding:'9px 12px',fontWeight:700,color:T.amber,textAlign:'right',borderTop:'2px solid '+T.border,fontSize:14,whiteSpace:'nowrap'}}>{cur(pendTotal)}</td>
                  <td colSpan={3} style={{borderTop:'2px solid '+T.border}}/>
                </tr></tfoot>
              </table>
            </div>}
          </div>}
        </div>
      </div>

      {toast&&<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:toast.type==='ok'?'#2a7a50':T.red,color:T.white,padding:'13px 20px',borderRadius:10,boxShadow:'0 8px 32px rgba(0,0,0,0.22)',fontSize:13,animation:'slideUp 0.22s ease',display:'flex',gap:10,alignItems:'center'}}>
        <span>{toast.type==='ok'?'✓':'⚠'}</span><span>{toast.msg}</span>
      </div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
